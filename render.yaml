services:
  # Backend API
  - type: web
    name: buildhaze-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm cache clean --force && npm install && npx prisma@5.22.0 generate && npm run build
    startCommand: npm install --omit=dev --ignore-scripts && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_SECRET_KEY
        sync: false

  # Admin UI (Web Service with serve)
  - type: web
    name: buildhaze-admin-ui
    runtime: node
    rootDir: apps/ui
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l 10000
    envVars:
      - key: NODE_VERSION
        value: 20.15.0
      - key: VITE_API_URL
        value: https://buildhaze.onrender.com
      - key: VITE_ADMIN_ONLY
        value: "true"

  # Client UI (Static Site)
  - type: static
    name: buildhaze-client-ui
    runtime: static
    rootDir: apps/ui
    buildCommand: rm -rf node_modules package-lock.json && npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.15.0
      - key: VITE_API_URL
        value: https://buildhaze.onrender.com
      - key: VITE_CLIENT_ONLY
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
