<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meniu - Coffee Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="logo" data-cms="logo">Coffee Shop</div>
            <ul class="nav-links">
                <li><a href="index.html">Acasă</a></li>
                <li><a href="menu.html" class="active">Meniu</a></li>
                <li><a href="about.html">Despre</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="page-hero" data-section="hero" data-section-id="menu-hero">
        <h1 data-cms="menu-page-title">Meniul Nostru</h1>
        <p data-cms="menu-page-desc">Descoperă toate deliciile noastre</p>
    </section>

    <section class="menu-full" data-section="menu-list" data-section-id="menu-list">
        <div class="container">
            <h2 data-cms="menu-section-title">Cafea</h2>
            <div class="menu-list">
                <div class="menu-row" data-cms="menu-item-4">
                    <span class="name" data-cms="menu-item-4-name">Americano</span>
                    <span class="dots"></span>
                    <span class="price" data-cms="menu-item-4-price">10 RON</span>
                </div>
                <div class="menu-row" data-cms="menu-item-5">
                    <span class="name" data-cms="menu-item-5-name">Mocha</span>
                    <span class="dots"></span>
                    <span class="price" data-cms="menu-item-5-price">15 RON</span>
                </div>
                <div class="menu-row" data-cms="menu-item-6">
                    <span class="name" data-cms="menu-item-6-name">Flat White</span>
                    <span class="dots"></span>
                    <span class="price" data-cms="menu-item-6-price">13 RON</span>
                </div>
            </div>

            <h2 data-cms="menu-pastry-title">Patiserie</h2>
            <div class="menu-list">
                <div class="menu-row" data-cms="pastry-1">
                    <span class="name" data-cms="pastry-1-name">Croissant</span>
                    <span class="dots"></span>
                    <span class="price" data-cms="pastry-1-price">8 RON</span>
                </div>
                <div class="menu-row" data-cms="pastry-2">
                    <span class="name" data-cms="pastry-2-name">Pain au Chocolat</span>
                    <span class="dots"></span>
                    <span class="price" data-cms="pastry-2-price">10 RON</span>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>© 2024 Coffee Shop</p>
    </footer>
</body>
</html>
